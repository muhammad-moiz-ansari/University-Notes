<!DOCTYPE html>
<html>
<head>
    <title>JS Master Cheat Sheet Code</title>
    <style>
        .dark-mode { background-color: #333; color: white; }
        .highlight { border: 2px solid yellow; }
        .task-item { margin: 5px 0; padding: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1 id="greeting">Welcome to the Dashboard</h1>
    
    <button id="themeBtn">Toggle Dark Mode</button>
    <div id="clock">Loading time...</div>
    
    <form id="taskForm">
        <input type="text" id="taskInput" placeholder="Enter a task...">
        <button type="submit">Add Task</button>
    </form>

    <div id="taskContainer">
        <h3>Your Tasks:</h3>
        <ul id="taskList">
            </ul>
    </div>

    <script>
        // ==========================================
        // 1. VARIABLES, DATA TYPES & BRACKET NOTATION
        // ==========================================
        let username = "Moiz"; // String
        const maxTasks = 5;    // Number
        var isOnline = true;   // Boolean

        // ==========================================
        // 2. COOKIES
        // ==========================================
        // Setting a cookie with an expiration date
        document.cookie = `user=${username}; expires=Thu, 18 Dec 2026 12:00:00 UTC; path=/`;

        // ==========================================
        // 3. JSON & BRACKET NOTATION
        // ==========================================
        const jsonString = '{"course": "CS406", "grade": "A"}';
        const parsedData = JSON.parse(jsonString); // String to Object
        
        // Using Bracket Notation (useful if key is dynamic)
        let dynamicKey = "course";
        console.log("Course:", parsedData[dynamicKey]); 

        // ==========================================
        // 4. DOM SELECTION
        // ==========================================
        const greetingEl = document.getElementById('greeting');
        const themeBtn = document.querySelector('#themeBtn');
        const taskForm = document.querySelector('#taskForm');
        const taskList = document.querySelector('#taskList');
        // Selecting all divs to demonstrate querySelectorAll
        const allDivs = document.querySelectorAll('div'); 

        // ==========================================
        // 5. FUNCTIONS (Declarations & Expressions)
        // ==========================================
        
        // Function Declaration (Hoisted)
        function updateGreeting(name) {
            greetingEl.textContent = `Welcome, ${name}!`; // .textContent (Plain text)
        }
        updateGreeting(username);

        // Function Expression (Assigned to variable)
        const applyHighlight = function() {
            // Looping through the NodeList from querySelectorAll
            allDivs.forEach(div => {
                div.classList.add('highlight'); // .classList.add()
            });
        };

        // ==========================================
        // 6. ASYNCHRONOUS JS: TIMERS
        // ==========================================
        
        // setTimeout (Runs once after 2 seconds)
        setTimeout(() => {
            applyHighlight();
        }, 2000);

        // setInterval (Runs repeatedly every 1 second)
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerHTML = `<b>Time:</b> ${now.toLocaleTimeString()}`; // .innerHTML
        }, 1000);

        // ==========================================
        // 7. EVENTS & DOM MODIFICATION (Creating/Appending)
        // ==========================================
        
        // Arrow Function as Event Listener
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault(); // CRUCIAL: Stops page from refreshing

            const inputField = document.getElementById('taskInput');
            const taskText = inputField.value;

            if(taskText !== "") {
                // createElement
                const newListItem = document.createElement('li');
                newListItem.textContent = taskText;
                newListItem.className = "task-item"; // Setting class directly
                
                // setAttribute & style.prop
                newListItem.setAttribute("data-status", "pending");
                newListItem.style.cursor = "pointer";
                
                // appendChild
                taskList.appendChild(newListItem);
                inputField.value = ""; // Clear input
            }
        });

        // Event Delegation using e.target (Removing an element)
        taskList.addEventListener('click', function(e) {
            // Check if the exact thing clicked was an LI
            if(e.target.tagName === 'LI') {
                // removeChild (or just e.target.remove() in modern JS)
                taskList.removeChild(e.target); 
            }
        });

        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });

        // ==========================================
        // 8. ASYNC/AWAIT & FETCH API (Promises)
        // ==========================================
        
        // Async Function using try/catch
        async function fetchInitialTasks() {
            try {
                // GET Request
                const response = await fetch('https://jsonplaceholder.typicode.com/todos?_limit=2');
                const data = await response.json(); // Parsing the JSON Promise
                
                // Loop through fetched data and add to DOM
                data.forEach(task => {
                    const li = document.createElement('li');
                    li.textContent = `API Task: ${task.title}`;
                    li.className = "task-item";
                    taskList.appendChild(li);
                });
            } catch (error) {
                console.error("Fetch failed:", error);
            }
        }

        // Call the async function when script runs
        fetchInitialTasks();

        // Example of a POST Request (Just logging it, not executing)
        const saveTaskToServer = async (taskData) => {
            const res = await fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(taskData) // Object to String
            });
            const result = await res.json();
            console.log("Saved to server:", result);
        };

    </script>
</body>
</html>
